<!DOCTYPE html>
<html lang="hy">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🤖 AI Օգնական</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #020617, #0f172a, #1e3a8a, #2563eb, #60a5fa);
    margin: 0;
    padding: 20px;
    color: white;
    min-height: 100vh;
}

.container {
    max-width: 800px;
    margin: auto;
    background: rgba(0, 0, 0, 0.5);
    padding: 20px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

textarea {
    width: 100%;
    height: 120px;
    padding: 12px;
    border-radius: 10px;
    border: none;
    outline: none;
    font-size: 16px;
    box-sizing: border-box;
    resize: vertical;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 10px;
    background: #2563eb;
    color: white;
    font-size: 16px;
    cursor: pointer;
    font-weight: bold;
    transition: background 0.2s;
}

button:hover {
    background: #1d4ed8;
}

.chat-box {
    margin-top: 20px;
    background: #0f172a;
    padding: 15px;
    border-radius: 15px;
    min-height: 200px;
    max-height: 500px;
    overflow-y: auto;
}

.message {
    margin: 12px 0;
    padding: 12px;
    border-radius: 10px;
    line-height: 1.5;
    white-space: pre-wrap;
}

.user {
    background: #2563eb;
    margin-left: 20px;
}

.ai {
    background: #1e293b;
    border: 1px solid #60a5fa;
    margin-right: 20px;
}
</style>

</head>

<body>

<div class="container">

    <h1>🤖 AI Օգնական (ChatGPT)</h1>

    <textarea id="question" placeholder="Գրիր քո հարցը... (Ctrl + Enter ուղարկելու համար)"></textarea>
    <button onclick="sendQuestion()">Ուղարկել</button>

    <div id="chatBox" class="chat-box"></div>

</div>

<script>
// 🔑 Ձեր OpenAI API բանալին
const API_KEY = "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"; 

const chatBox = document.getElementById("chatBox");
const questionInput = document.getElementById("question");

// Enter-ով հարցն ուղարկելու համար
questionInput.addEventListener("keydown", function(e) {
    if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendQuestion();
    }
});

// ===== ՄԵՍԻՋԻ ԱՎԵԼԱՑՈՒՄ =====
function addMessage(role, text) {
    const div = document.createElement("div");
    div.className = "message " + role;
    div.textContent = text;

    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
}

// ===== OpenAI API ՀԱՐՑՈՒՄ =====
async function askAI(question) {
    try {
        const res = await fetch("https://api.openai.com/v1/chat/completions", {
            method: "POST",
            headers: {
                "Authorization": "Bearer " + API_KEY,
                "Content-Type": "application/json"
            },
            referrerPolicy: "no-referrer", // Անվտանգության համար
            body: JSON.stringify({
                model: "gpt-4o-mini", 
                messages: [
                    { role: "system", content: "Դու օգնական AI ես և պատասխանում ես հայերեն" },
                    { role: "user", content: question }
                ]
            })
        });

        if (!res.ok) {
            return "❌ API Սխալ: " + res.status;
        }

        const data = await res.json();
        return data?.choices?.[0]?.message?.content || "❌ Պատասխան չկա";

    } catch (err) {
        return "❌ Ցանցային սխալ (Network error)";
    }
}

// ===== ՈՒՂԱՐԿԵԼ =====
async function sendQuestion() {
    const q = questionInput.value.trim();
    if (!q) return;

    addMessage("user", "👤 Դու: " + q);
    questionInput.value = "";

    addMessage("ai", "🤖 AI: ⌛ մտածում եմ...");

    const answer = await askAI(q);

    chatBox.lastChild.textContent = "🤖 AI: " + answer;
}
</script>

</body>
</html>
