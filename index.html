<script>

const API_KEY = "PASTE_YOUR_OPENROUTER_KEY";

const chatBox = document.getElementById("chatBox");

// ================= UI =================
function addMessage(role,text){

const div = document.createElement("div");
div.className = "message " + role;
div.innerHTML = text;

chatBox.appendChild(div);
chatBox.scrollTop = chatBox.scrollHeight;

}

// ================= AI FALLBACK ENGINE =================
async function askAI(question){

// ===== 1st MODEL =====
const models = [
"deepseek/deepseek-chat-v3-0324:free",
"openai/gpt-4o-mini",
"meta-llama/llama-3.1-8b-instruct:free"
];

for(let model of models){

try{

const res = await fetch("https://openrouter.ai/api/v1/chat/completions",{
method:"POST",
headers:{
"Authorization":"Bearer " + API_KEY,
"Content-Type":"application/json",
"HTTP-Referer":"http://localhost",
"X-Title":"AI Fallback System"
},
body:JSON.stringify({
model:model,
messages:[
{role:"system",content:"Դու օգնական AI ես, պատասխանում ես հայերեն պարզ ձևով"},
{role:"user",content:question}
]
})
});

const data = await res.json();

// success check
if(data?.choices?.length){
return data.choices[0].message.content;
}

}catch(e){
// try next model
console.log("Model failed:", model);
}

}

// ================= OFFLINE FALLBACK =================
return localAI(question);

}

// ================= SMART OFFLINE AI =================
function localAI(q){

q = q.toLowerCase();

// simple math
if(q.includes("+") || q.includes("-") || q.includes("*")){
return "🧮 Թվում է մաթեմատիկական հարց է։ Կարող եմ օգնել հաշվարկով, գրիր ավելի հստակ։";
}

if(q.includes("ինչ է") || q.includes("what")){
return "📘 Սա հետաքրքիր հարց է։ Սա հիմնական հասկացություն է, կարող եմ բացատրել պարզ օրինակով։";
}

if(q.includes("բարև")){
return "👋 Բարև քեզ։ Ես fallback AI եմ, բայց դեռ կարող եմ օգնել 🙂";
}

return "🤖 Հիմա AI կապը հասանելի չէ, բայց կարող եմ օգնել պարզ բացատրությամբ։ Գրիր ավելի կոնկրետ հարց։";

}

// ================= SEND =================
async function sendQuestion(){

const input = document.getElementById("question");
const q = input.value.trim();

if(!q) return;

addMessage("user","🟢 "+q);

input.value="";

const answer = await askAI(q);

addMessage("ai","🤖 "+answer);

}

</script>
