<!DOCTYPE html>
<html lang="hy">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🤖 AI  Օգնական</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
body{
font-family:'Montserrat',sans-serif;
background:linear-gradient(135deg,#020617,#0f172a,#1e3a8a,#2563eb,#60a5fa);
margin:0;
padding:25px;
color:white;
}

.container{
max-width:900px;
margin:auto;
background:rgba(15,23,42,0.9);
padding:25px;
border-radius:25px;
border:2px solid #60a5fa;
}

textarea{
width:100%;
height:140px;
padding:15px;
border-radius:15px;
border:2px solid #60a5fa;
background:#1e293b;
color:white;
font-size:15px;
}

button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:15px;
background:#2563eb;
color:white;
font-size:16px;
cursor:pointer;
}

.chat-box{
margin-top:20px;
background:#0f172a;
padding:15px;
border-radius:20px;
min-height:250px;
}

.message{
margin:10px 0;
padding:12px;
border-radius:12px;
}

.user{background:#2563eb;}
.ai{background:#1e293b;border:1px solid #60a5fa;}

</style>
</head>

<body>

<div class="container">

<h1>🤖 AI Օգնական</h1>

<textarea id="question" placeholder="Գրիր քո հարցը..."></textarea>
<button onclick="sendQuestion()">Ուղարկել</button>

<div id="chatBox" class="chat-box"></div>

</div>

<script>

const API_KEY = "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";

const chatBox = document.getElementById("chatBox");

let history = [];

function addMessage(role,text){

const div = document.createElement("div");
div.classList.add("message");
div.classList.add(role);
div.innerHTML = text;

chatBox.appendChild(div);
chatBox.scrollTop = chatBox.scrollHeight;

history.push({role,text});

}

async function askAI(question){

const res = await fetch("https://api.openai.com/v1/chat/completions",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer " + API_KEY
},
body:JSON.stringify({
model:"gpt-4o-mini",
messages:[
{role:"system",content:"Դու ուսուցողական AI օգնական ես և պատասխանում ես հայերեն պարզ ձևով"},
{role:"user",content:question}
]
})
});

const data = await res.json();

if(data.choices && data.choices.length){
return data.choices[0].message.content;
}

return "Սխալ պատասխան";

}

async function sendQuestion(){

const input = document.getElementById("question");
const q = input.value.trim();

if(!q) return;

addMessage("user","🟢 "+q);

input.value="";

const answer = await askAI(q);

addMessage("ai","🤖 "+answer);

}

</script>

</body>
</html>
