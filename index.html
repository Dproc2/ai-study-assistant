<!DOCTYPE html>
<html lang="hy">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🤖 AI Օգնական</title>

<style>
body{
font-family:Arial;
background:linear-gradient(135deg,#020617,#0f172a,#1e3a8a,#2563eb,#60a5fa);
margin:0;
padding:20px;
color:white;
}

.container{
max-width:800px;
margin:auto;
background:rgba(0,0,0,0.4);
padding:20px;
border-radius:20px;
}

textarea{
width:100%;
height:120px;
padding:10px;
border-radius:10px;
border:none;
outline:none;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
font-size:16px;
cursor:pointer;
}

.chat-box{
margin-top:15px;
background:#0f172a;
padding:15px;
border-radius:15px;
min-height:200px;
}

.message{
margin:10px 0;
padding:10px;
border-radius:10px;
}

.user{background:#2563eb;}
.ai{background:#1e293b;border:1px solid #60a5fa;}
</style>
</head>

<body>

<div class="container">

<h1>🤖 AI Օգնական</h1>

<textarea id="question" placeholder="Գրիր քո հարցը..."></textarea>
<button onclick="sendQuestion()">Ուղարկել</button>

<div id="chatBox" class="chat-box"></div>

</div>

<script>

// 🔑 ՔՈ OPENROUTER KEY (փոխիր սա)
const API_KEY = "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";

const chatBox = document.getElementById("chatBox");

function addMessage(role,text){

const div = document.createElement("div");
div.className = "message " + role;
div.innerHTML = text;

chatBox.appendChild(div);
chatBox.scrollTop = chatBox.scrollHeight;

}

async function askAI(question){

const res = await fetch("https://openrouter.ai/api/v1/chat/completions",{
method:"POST",
headers:{
"Authorization":"Bearer " + API_KEY,
"Content-Type":"application/json",
"HTTP-Referer":"http://localhost",
"X-Title":"AI App"
},
body:JSON.stringify({
model:"deepseek/deepseek-chat-v3-0324:free",
messages:[
{role:"system",content:"Դու ուսուցողական AI ես, պատասխանում ես հայերեն պարզ ձևով"},
{role:"user",content:question}
]
})
});

const data = await res.json();

return data.choices?.[0]?.message?.content || "❌ Պատասխան չկա";
}

async function sendQuestion(){

const input = document.getElementById("question");
const q = input.value.trim();

if(!q) return;

addMessage("user","🟢 "+q);

input.value="";

const answer = await askAI(q);

addMessage("ai","🤖 "+answer);

}

</script>

</body>
</html>
