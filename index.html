<!DOCTYPE html>
<html lang="hy">
<head>
<meta charset="UTF-8">
<title>Մարդու նման AI Ուսման Օգնական</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: #f0f4f8;
  margin: 0;
  padding: 0;
}

.container {
  max-width: 700px;
  margin: 50px auto;
  background: #ffffff;
  padding: 25px;
  border-radius: 12px;
  box-shadow: 0 0 20px rgba(0,0,0,0.1);
}

h1 {
  text-align: center;
  color: #2c3e50;
}

.subtitle {
  text-align: center;
  color: #555;
  margin-bottom: 20px;
}

textarea {
  width: 100%;
  height: 120px;
  padding: 12px;
  font-size: 16px;
  border-radius: 6px;
  border: 1px solid #ccc;
  resize: none;
}

button {
  width: 100%;
  margin-top: 15px;
  padding: 12px;
  font-size: 17px;
  background: #3498db;
  color: #fff;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

button:hover {
  background: #2980b9;
}

.answer-box {
  margin-top: 20px;
  padding: 15px;
  background: #eef3f7;
  border-radius: 6px;
  white-space: pre-line;
}
</style>
</head>
<body>

<div class="container">
  <h1>🤖 Մարդու նման AI Ուսման Օգնական</h1>
  <p class="subtitle">
    Գրիր ցանկացած հարց, ես կփորձեմ պատասխանել, բացատրել և օրինակ տալ
  </p>

  <textarea id="question" placeholder="Գրիր քո հարցը այստեղ..."></textarea>
  <button onclick="getAnswer()">Հարցնել</button>

  <div id="answer" class="answer-box">
    Այստեղ կհայտնվի պատասխանը
  </div>
</div>

<script>
// Պահպանում ենք նախորդ հարցերը՝ chat history
let chatHistory = [];

function getAnswer() {
  const questionInput = document.getElementById("question");
  const answerBox = document.getElementById("answer");

  const question = questionInput.value.trim();
  if (!question) {
    answerBox.innerText = "Գրիր քո հարցը, ես կփորձեմ օգնել 🙂";
    return;
  }

  let response = "";

  // Տողերը ստուգում ենք lowercase-ում
  const q = question.toLowerCase();

  // Մաթեմատիկա
  if (q.includes("տոկոս") || q.includes("%") || q.includes("հաշվել")) {
    response = "Տոկոսը նշանակում է «հարյուրից մի մասը»։\n" +
               "Օրինակ՝ եթե ունենք 100 և ուզում ենք գտնել 20%-ը, ստանում ենք 20։\n" +
               "Կարող ես գրել կոնկրետ խնդիր, և միասին կլուծենք։";
  }
  // Հիմնական մարդկային հարցերի օրինակներ
  else if (q.includes("ինչ է") || q.includes("պատմություն") || q.includes("հայոց") || q.includes("գոյական") || q.includes("ալգորիթմ")) {
    response = "Հիանալի հարց 😊\n" +
               "Ահա իմ բացատրությունը.\n" +
               "Եթե ուզում ես, կարող եմ տալ նաև օրինակ կամ հավելյալ մանրամասներ։";
  }
  // Եթե թեման չի ճանաչվում
  else {
    response = "Համոզված չեմ, որ ճիշտ հասկացա 🤔\n" +
               "Կփորձե՞ս ձևակերպել այլ կերպ կամ ավելացնել օրինակ, որ ավելի հստակ լինի։";
  }

  // Հիշում ենք հարցը և պատասխանը
  chatHistory.push({question, response});

  // Ցուցադրում ենք ամբողջ chat history
  let fullChat = "";
  chatHistory.forEach((chat, index) => {
    fullChat += `🟢 Քո հարցը: ${chat.question}\n🤖 Պատասխան: ${chat.response}\n\n`;
  });

  answerBox.innerText = fullChat;

  // Տեքստը մաքրել input-ից
  questionInput.value = "";
}
</script>

</body>
</html>
